<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">
    <div class="translator-card">
      <div class="top-controls">
        <select id="sourceLang">
          <option value="auto">Detect Language</option>
          <option value="en">English</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
        </select>

        <button id="switchBtn" class="swap">⇄</button>

        <select id="targetLang">
          <option value="en">English</option>
          <option value="fr" selected>French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
        </select>
      </div>

      <div class="translation-box">
        <div class="input-box">
          <label>Input</label>
          <textarea id="inputText">Hello, how are you</textarea>
          <div class="tools">
            <span id="speakInput">🔊 Listen</span>
            <span id="copyInput">📋 Copy</span>
            <span id="charCount" class="count">18/500</span>
          </div>
        </div>

        <div class="output-box">
          <label>Output</label>
          <div id="outputText" class="translated-text">
            Bonjour, comment allez-vous
          </div>
          <div class="tools">
            <span id="speakOutput">🔊 Listen</span>
            <span id="copyOutput">📋 Copy</span>
          </div>
        </div>
      </div>

      <button id="translateBtn" class="translate-btn">Translate</button>
    </div>
  </div>
</body>
<script src="script.js"></script>
</html>
